<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Image unavailable</title>
  <desc id="desc">A quiet placeholder used when an old article image is unavailable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5f4ed"/>
      <stop offset="0.58" stop-color="#faf9f5"/>
      <stop offset="1" stop-color="#e8e6dc"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#1b365d"/>
      <stop offset="1" stop-color="#2d5a8a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <circle cx="260" cy="140" r="180" fill="#1b365d" opacity="0.08" filter="url(#soft)"/>
  <circle cx="950" cy="520" r="220" fill="#504e49" opacity="0.08" filter="url(#soft)"/>
  <path d="M124 520 C 268 390, 378 430, 518 302 S 784 186, 1076 338" fill="none" stroke="url(#line)" stroke-width="4" opacity="0.36"/>
  <path d="M124 570 C 308 482, 456 510, 618 390 S 858 294, 1076 424" fill="none" stroke="#504e49" stroke-width="3" opacity="0.18"/>
  <rect x="432" y="232" width="336" height="216" rx="18" fill="#faf9f5" opacity="0.82" stroke="#d4d1c5"/>
  <path d="M502 370 L570 300 L638 370 L680 328 L730 370 V402 H502 Z" fill="#e4ecf5" stroke="#1b365d" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="674" cy="294" r="20" fill="#e8e6dc" stroke="#504e49" stroke-width="3"/>
  <text x="600" y="498" text-anchor="middle" fill="#141413" font-family="Charter, Georgia, 'Songti SC', 'STSong', serif" font-size="32" font-weight="400">原图暂不可用</text>
  <text x="600" y="544" text-anchor="middle" fill="#6b6a64" font-family="Charter, Georgia, 'Songti SC', 'STSong', serif" font-size="22" font-weight="400">旧文章图片已改为本地占位，避免继续请求失效图床</text>
</svg>
